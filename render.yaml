services:
  - type: web
    runtime: node
    name: controle-mensalidades
    plan: starter
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_FILE
        value: /var/data/database.json
    disk:
      name: controle-mensalidades-data
      mountPath: /var/data
      sizeGB: 1
